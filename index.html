<title>HAB</title>
<style>
:root{
  --green:#1DB954;--amber:#f59e0b;--red:#ef4444;
  --bg:#0a0a0a;--bg2:#161616;--bg3:#1e1e1e;
  --border:rgba(255,255,255,0.08);
  --text:#fff;--text2:rgba(255,255,255,0.48);--text3:rgba(255,255,255,0.2);
  --r:14px;--st:env(safe-area-inset-top);--sb:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
input{-webkit-user-select:text;user-select:text;touch-action:auto}
html{background:var(--bg)}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overscroll-behavior:none;padding-bottom:calc(var(--sb)+72px)}
body.has-bg{background-size:cover!important;background-position:center!important;background-attachment:fixed!important}

/* TOPBAR */
.topbar-wrap{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:.5px solid var(--border)}
#topbar{padding:calc(var(--st)+10px) 14px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px}
#topbar-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
#topbar-sub{font-size:11px;color:var(--text2);margin-top:1px}
.nav-row{display:flex;gap:6px;align-items:center;flex-shrink:0}
.nbtn{width:32px;height:32px;border-radius:9px;background:var(--bg3);border:.5px solid var(--border);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nbtn:active{opacity:.5}
.start-btn{padding:5px 13px;border-radius:20px;border:none;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.4px;font-family:inherit;white-space:nowrap}
.start-btn.stopped{background:var(--green);color:#000}
.start-btn.running{background:var(--red);color:#fff}
.start-btn.paused{background:var(--amber);color:#000}
#paused-banner{background:rgba(245,158,11,.1);border:.5px solid rgba(245,158,11,.3);border-radius:10px;padding:8px 14px;margin:8px 14px 0;font-size:12px;color:var(--amber);text-align:center;display:none}

/* PAGES */
.page{display:none;padding:12px 14px calc(var(--sb) + 90px);overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.page.active{display:block}

/* STAT CARDS */
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.sc{background:rgba(22,22,22,.9);border:.5px solid var(--border);border-radius:var(--r);padding:10px 12px}
.sc-label{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--text2);margin-bottom:3px}
.sc-val{font-size:22px;font-weight:700;letter-spacing:-.8px;line-height:1}
.sc-unit{font-size:11px;font-weight:400;color:var(--text2)}
.sc.g{border-color:rgba(29,185,84,.35)}.sc.g .sc-val{color:var(--green)}
.sc.a{border-color:rgba(245,158,11,.35)}.sc.a .sc-val{color:var(--amber)}

/* WEEK STRIP */
#week-strip{background:rgba(22,22,22,.9);border:.5px solid var(--border);border-radius:var(--r);padding:10px 6px;display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.wd-col{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer}
.wd-lbl{font-size:8px;color:var(--text3);text-transform:uppercase;letter-spacing:.3px}
.wd-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text3);position:relative;transition:all .18s}
.wd-dot.today-dot{border-color:var(--green);color:var(--green);background:rgba(29,185,84,.15)}
.wd-dot.full{background:var(--green);border-color:var(--green);color:#000}
.wd-dot.good{border-color:var(--green);color:var(--green)}
.wd-dot.part{border-color:var(--amber);color:var(--amber)}
.wd-dot.fut{opacity:.18}
.wd-dot.paused-day{opacity:.2;border-style:dashed}
.wd-dot.sel{box-shadow:0 0 0 2px rgba(255,255,255,.35)}

/* DAY HEADER */
#day-header{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
#day-name{font-size:20px;font-weight:700;letter-spacing:-.4px}
#day-date{font-size:13px;color:var(--text2)}
.badge{font-size:10px;font-weight:700;background:var(--green);color:#000;padding:2px 7px;border-radius:20px}
.future-badge{font-size:10px;font-weight:700;background:var(--bg3);color:var(--text3);padding:2px 7px;border-radius:20px}

/* PROGRESS */
#prog-wrap{margin-bottom:10px}
#prog-top{display:flex;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--text2)}
#prog-val{font-weight:700;color:var(--green)}
#prog-track{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
#prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .35s ease}

/* HABITS */
.sec-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
#habits-list{display:flex;flex-direction:column;gap:7px;touch-action:pan-y}
.hr{background:rgba(22,22,22,.9);border:.5px solid var(--border);border-radius:var(--r);padding:13px 14px;display:flex;align-items:center;gap:11px;cursor:pointer;touch-action:manipulation}
.hr.done{border-color:rgba(29,185,84,.3);background:rgba(29,185,84,.07)}
.hr.locked{opacity:.35;cursor:default;pointer-events:none}
.hr-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s}
.hr.done .hr-check{background:var(--green);border-color:var(--green)}
.hr-check svg{width:12px;height:12px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.4);transition:all .18s}
.hr.done .hr-check svg{opacity:1;transform:scale(1)}
.hr-icon{font-size:19px;flex-shrink:0}
.hr-name{font-size:14px;font-weight:500;flex:1}
.hr.done .hr-name{color:var(--text2);text-decoration:line-through;text-decoration-color:var(--text3)}

/* BOTTOM BAR */
#bottombar{position:fixed;bottom:0;left:0;right:0;padding:8px 0 calc(var(--sb)+8px);background:rgba(10,10,10,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:.5px solid var(--border);display:flex;z-index:50}

let snapshots={};
let statPeriod="day", emojiFor=null, selectedDow=1, weekOff=0;
let wallpaper={type:"none",value:""};

// ── STORAGE ───────────────────────────────────────────────────────
function save(){
  try{
    localStorage.setItem("hb_h",JSON.stringify(habits));
    localStorage.setItem("hb_c",JSON.stringify(checks));
    localStorage.setItem("hb_p",JSON.stringify(prog));
    localStorage.setItem("hb_s",JSON.stringify(snapshots));
    localStorage.setItem("hb_wp",JSON.stringify(wallpaper));
  }catch(e){}
}
function load(){
  try{
    const h=localStorage.getItem("hb_h"),c=localStorage.getItem("hb_c");
    const p=localStorage.getItem("hb_p"),s=localStorage.getItem("hb_s");
    const w=localStorage.getItem("hb_wp");
    habits=h?JSON.parse(h):JSON.parse(JSON.stringify(DFLT));
    checks=c?JSON.parse(c):{};
    prog=p?JSON.parse(p):{status:"stopped",periods:[]};
    snapshots=s?JSON.parse(s):{};
    wallpaper=w?JSON.parse(w):{type:"none",value:""};
    habits.forEach(h=>{if(!h.days)h.days=[1,2,3,4,5,6,7];});
  }catch(e){
    habits=JSON.parse(JSON.stringify(DFLT));checks={};
    prog={status:"stopped",periods:[]};snapshots={};wallpaper={type:"none",value:""};
  }
}

// ── SNAPSHOT: freeze schedule for a date ─────────────────────────
// Called when we first interact with a day — records which habits are scheduled
function ensureSnapshot(dk, dow){
  if(snapshots[dk]) return; // already frozen
  const snap={};
  habits.forEach(h=>{snap[h.key]=!!(h.days&&h.days.includes(dow));});
  snapshots[dk]=snap;
  save();
}
// Get the list of habits scheduled for a past/frozen date
function habitsForDay(dk, dow){
  if(snapshots[dk]){
    // return habits in current order, but only those scheduled at that time
    return habits.filter(h=>snapshots[dk][h.key]===true);
  }
  // future or no snapshot yet: use current schedule
  return habits.filter(h=>h.days&&h.days.includes(dow));
}

// ── DATE UTILS ────────────────────────────────────────────────────
function dateKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function todayMidnight(){const d=new Date();d.setHours(0,0,0,0);return d;}
function isoDow(d){const r=d.getDay();return r===0?7:r;}
function getWeekMonday(){const t=todayMidnight(),dow=isoDow(t),mon=new Date(t);mon.setDate(t.getDate()-(dow-1)+weekOff*7);return mon;}
function dateForDow(dow){const mon=getWeekMonday(),d=new Date(mon);d.setDate(mon.getDate()+(dow-1));return d;}
function isoWeekNum(d){const t=new Date(d);t.setHours(0,0,0,0);t.setDate(t.getDate()+3-(t.getDay()+6)%7);const w1=new Date(t.getFullYear(),0,4);return 1+Math.round(((t-w1)/86400000-3+(w1.getDay()+6)%7)/7);}

// ── PROGRAMME ─────────────────────────────────────────────────────
function isActiveOn(dk){
  if(!prog.periods||!prog.periods.length)return false;
  const d=new Date(dk);
  for(const p of prog.periods){const from=new Date(p.from),to=p.to?new Date(p.to):new Date("9999-12-31");if(d>=from&&d<=to)return true;}
  return false;
}
function firstActiveDate(){return prog.periods&&prog.periods.length?prog.periods[0].from:null;}

function updateStartBtn(){
  const btn=document.getElementById("start-btn"),banner=document.getElementById("paused-banner");
  if(prog.status==="running"){btn.textContent="PAUSE";btn.className="start-btn running";banner.style.display="none";}
  else if(prog.status==="paused"){btn.textContent="REPRENDRE";btn.className="start-btn paused";banner.style.display="block";}
  else{btn.textContent="START";btn.className="start-btn stopped";banner.style.display="none";}
}
document.getElementById("start-btn").addEventListener("click",()=>{
  const today=dateKey(todayMidnight());
  if(prog.status==="stopped"){prog.status="running";prog.periods=[{from:today,to:null}];}
  else if(prog.status==="running"){
    prog.status="paused";
    const last=prog.periods[prog.periods.length-1];
    const yest=new Date(todayMidnight());yest.setDate(yest.getDate()-1);
    last.to=dateKey(yest);if(last.to<last.from)last.to=last.from;
  }else{prog.status="running";prog.periods.push({from:today,to:null});}
  save();updateStartBtn();renderToday();
});

// ── SCORE: uses snapshot for past days ────────────────────────────
function scoreOf(dk, dow){
  const hs=habitsForDay(dk,dow);
  const total=hs.length;
  if(!checks[dk]||total===0)return{done:0,total};
  const done=hs.filter(h=>checks[dk][h.key]).length;
  return{done,total};
}

// Day is "complete" if done === total (and total > 0)
function isDayComplete(dk, dow){const sc=scoreOf(dk,dow);return sc.total>0&&sc.done===sc.total;}

function streak(){
  const today=todayMidnight();let s=0;
  for(let i=0;i<365;i++){
    const d=new Date(today);d.setDate(today.getDate()-i);
    const dk=dateKey(d);if(!isActiveOn(dk))break;
    const dow=isoDow(d),sc=scoreOf(dk,dow);
    // no habits scheduled that day = doesn't break streak
    if(sc.total===0){s++;continue;}
    if(sc.done>=Math.ceil(sc.total*0.5))s++;
    else if(i>0)break;
  }
  return s;
}

// ── TOGGLE ────────────────────────────────────────────────────────
function toggle(dk,hkey){
  if(prog.status!=="running")return;
  const d=new Date(dk);d.setHours(0,0,0,0);
  if(d>todayMidnight())return; // no future cheating
  if(!checks[dk])checks[dk]={};
  checks[dk][hkey]=!checks[dk][hkey];
  save();renderToday();
}

// ── RENDER TODAY ──────────────────────────────────────────────────
function renderToday(){
  const today=todayMidnight(),todayK=dateKey(today),todayDow=isoDow(today);
  const mon=getWeekMonday(),sun=new Date(mon);sun.setDate(mon.getDate()+6);
  document.getElementById("topbar-sub").textContent=mon.getDate()+" "+MONTHS[mon.getMonth()]+" – "+sun.getDate()+" "+MONTHS[sun.getMonth()];

  // Stats: always based on today's real date
  const todaySc=scoreOf(todayK,todayDow);
  const tPct=todaySc.total>0?Math.round(todaySc.done/todaySc.total*100):0;
  document.getElementById("s-today").innerHTML=tPct+'<span class="sc-unit">%</span>';

  // Week %: ratio of complete days / active days this week
  let completeDays=0,activeDays=0;
  for(let d=1;d<=7;d++){
    const day=dateForDow(d);if(day>today)continue;
    const dk=dateKey(day);if(!isActiveOn(dk))continue;
    const sc=scoreOf(dk,d);
    if(sc.total===0)continue; // no habits = skip
    activeDays++;
    if(isDayComplete(dk,d))completeDays++;
  }
  const wPct=activeDays>0?Math.round(completeDays/activeDays*100):0;
  document.getElementById("s-week").innerHTML=wPct+'<span class="sc-unit">%</span>';
  document.getElementById("s-streak").innerHTML=streak()+'<span class="sc-unit">j</span>';

  // Week strip
  const strip=document.getElementById("week-strip");strip.innerHTML="";
  for(let d=1;d<=7;d++){
    const day=dateForDow(d),dk=dateKey(day);
    const isToday=(weekOff===0&&d===todayDow);
    const isFut=day>today,active=isActiveOn(dk);
    const sc=scoreOf(dk,d),pct=sc.total>0?sc.done/sc.total:0;
    let cls="wd-dot";
    if(isToday)cls+=" today-dot";
    else if(!isFut&&active&&sc.total>0){
      if(pct===1)cls+=" full";else if(pct>=0.5)cls+=" good";else if(pct>0)cls+=" part";
    }
    if(isFut)cls+=" fut";
    if(!active&&!isFut&&!isToday)cls+=" paused-day";
    if(d===selectedDow)cls+=" sel";
    const inner=(!isFut&&sc.total>0)?sc.done:"";
    const col=document.createElement("div");col.className="wd-col";
    col.innerHTML='<div class="wd-lbl">'+DAY_L[d-1]+'</div><div class="'+cls+'" >'+(inner)+'</div>';
    col.addEventListener("click",()=>{selectedDow=d;renderToday();});
    strip.appendChild(col);
  }

  // Day header
  const selDay=dateForDow(selectedDow),selKey=dateKey(selDay);
  const isTodaySel=(weekOff===0&&selectedDow===todayDow),isFutSel=selDay>today;
  document.getElementById("day-name").textContent=DAYS_FULL[selectedDow-1];
  document.getElementById("day-date").textContent=selDay.getDate()+" "+MONTHS[selDay.getMonth()];
  const badge=document.getElementById("day-badge");
  if(isTodaySel){badge.textContent="Aujourd'hui";badge.className="badge";}
  else if(isFutSel){badge.textContent="À venir";badge.className="future-badge";}
  else{badge.textContent="";badge.className="";}

  // Progress for selected day
  const sc2=scoreOf(selKey,selectedDow);
  const pct2=sc2.total>0?Math.round(sc2.done/sc2.total*100):0;
  document.getElementById("prog-val").textContent=sc2.done+" / "+sc2.total+"  ("+pct2+"%)";
  document.getElementById("prog-fill").style.width=pct2+"%";
  renderHabits(selKey,selectedDow,isFutSel);
}

function renderHabits(selKey,dow,isFuture){
  const el=document.getElementById("habits-list");el.innerHTML="";
  const isRunning=prog.status==="running";
  const canCheck=isRunning&&!isFuture&&isActiveOn(selKey);
  // Ensure snapshot so future planning changes don't affect past
  if(canCheck||(!isFuture&&isActiveOn(selKey))){ensureSnapshot(selKey,dow);}
  const hs=habitsForDay(selKey,dow);
  if(!hs.length){
    el.innerHTML='<div style="text-align:center;color:var(--text3);padding:20px;font-size:13px">Aucune habitude ce jour</div>';
    return;
  }
  hs.forEach(h=>{
    const done=!!(checks[selKey]&&checks[selKey][h.key]);
    const row=document.createElement("div");
    row.className="hr"+(done?" done":"")+(canCheck?"":" locked");
    row.innerHTML='<div class="hr-check"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div><div class="hr-icon">'+h.icon+'</div><div class="hr-name">'+h.label+'</div>';
    if(canCheck)row.addEventListener("click",()=>toggle(selKey,h.key));
    el.appendChild(row);
  });
}

// ── STATS ─────────────────────────────────────────────────────────
function renderStats(){
  const idx=Math.floor(Date.now()/3600000)%QUOTES.length; // changes every hour
  const q=QUOTES[idx];
  document.getElementById("quote-text").textContent='"'+q.t+'"';
  document.getElementById("quote-author").textContent="— "+q.a;
  renderHist();
}

function renderHist(){
  const today=todayMidnight(),el=document.getElementById("hist-list");el.innerHTML="";
  if(!prog.periods||!prog.periods.length){
    el.innerHTML='<div style="text-align:center;color:var(--text3);padding:30px;font-size:13px">Lance le programme pour voir l\'historique</div>';
    return;
  }
  const firstDate=new Date(firstActiveDate());firstDate.setHours(0,0,0,0);

  if(statPeriod==="day"){
    let d=new Date(today);
    while(d>=firstDate){
      const dk=dateKey(d),dow=isoDow(d),active=isActiveOn(dk);
      const sc=scoreOf(dk,dow);
      const complete=sc.total>0&&sc.done===sc.total;
      const pct=sc.total>0?Math.round(sc.done/sc.total*100):0;
      const color=!active?"var(--amber)":(sc.total===0?"var(--text3)":(complete?"#1DB954":pct>=50?"#f59e0b":"#ef4444"));
      const row=document.createElement("div");
      row.className="hist-row"+(active?"":' hist-paused');
      row.innerHTML='<div class="hist-date">'+d.getDate()+" "+MONTHS[d.getMonth()]+'</div>'+
        '<div class="hist-bar-wrap"><div class="hist-bar" style="width:'+(active?pct:0)+'%;background:'+color+'"></div></div>'+
        '<div class="hist-score" style="color:'+color+'">'+(active?(sc.total>0?sc.done+"/"+sc.total:"–"):"pause")+'</div>';
      el.appendChild(row);d.setDate(d.getDate()-1);
    }
  } else if(statPeriod==="week"){
    const firstMon=new Date(firstDate);firstMon.setDate(firstDate.getDate()-(isoDow(firstDate)-1));
    let mon=new Date(getWeekMonday());
    while(mon>=firstMon){
      let complete=0,total=0,hasActive=false;
      for(let i=0;i<7;i++){
        const day=new Date(mon);day.setDate(mon.getDate()+i);
        if(day>today||day<firstDate)continue;
        const dk=dateKey(day),dow=isoDow(day);
        if(!isActiveOn(dk))continue;
        const sc=scoreOf(dk,dow);if(sc.total===0)continue;
        hasActive=true;total++;
        if(isDayComplete(dk,dow))complete++;
      }
      const pct=total>0?Math.round(complete/total*100):0;
      const color=!hasActive?"var(--amber)":(pct===100?"#1DB954":pct>=50?"#f59e0b":"#ef4444");
      const wn=isoWeekNum(mon);
      const row=document.createElement("div");
      row.className="hist-row"+(!hasActive?" hist-paused":"");
      row.innerHTML='<div class="hist-date">S'+wn+' · '+mon.getFullYear()+'</div>'+
        '<div class="hist-bar-wrap"><div class="hist-bar" style="width:'+(!hasActive?0:pct)+'%;background:'+color+'"></div></div>'+
        '<div class="hist-score" style="color:'+color+'">'+(!hasActive?"pause":(total>0?complete+"/"+total+" j":"–"))+'</div>';
      el.appendChild(row);mon.setDate(mon.getDate()-7);
      if(mon<firstMon)break;
    }
  } else {
    let ref=new Date(today.getFullYear(),today.getMonth(),1);
    const firstMon=new Date(firstDate.getFullYear(),firstDate.getMonth(),1);
    while(ref>=firstMon){
      const yr=ref.getFullYear(),mo=ref.getMonth(),dim=new Date(yr,mo+1,0).getDate();
      let complete=0,total=0,hasActive=false;
      for(let d=1;d<=dim;d++){
        const day=new Date(yr,mo,d);if(day>today||day<firstDate)continue;
        const dk=dateKey(day),dow=isoDow(day);
        if(!isActiveOn(dk))continue;
        const sc=scoreOf(dk,dow);if(sc.total===0)continue;
        hasActive=true;total++;
        if(isDayComplete(dk,dow))complete++;
      }
      const pct=total>0?Math.round(complete/total*100):0;
      const color=!hasActive?"var(--amber)":(pct===100?"#1DB954":pct>=50?"#f59e0b":"#ef4444");
      const row=document.createElement("div");
      row.className="hist-row"+(!hasActive?" hist-paused":"");
      row.innerHTML='<div class="hist-date">'+MONTHS[mo]+' '+yr+'</div>'+
        '<div class="hist-bar-wrap"><div class="hist-bar" style="width:'+(!hasActive?0:pct)+'%;background:'+color+'"></div></div>'+
        '<div class="hist-score" style="color:'+color+'">'+(!hasActive?"pause":(total>0?complete+"/"+total+" j":"–"))+'</div>';
      el.appendChild(row);ref.setMonth(ref.getMonth()-1);
    }
  }
}

// ── EDIT ──────────────────────────────────────────────────────────
let dragSrcIdx=null;

function renderEdit(){
  const el=document.getElementById("edit-list");el.innerHTML="";
  habits.forEach((h,i)=>{
    if(!h.days)h.days=[1,2,3,4,5,6,7];
    const allOn=h.days.length===7;
    const row=document.createElement("div");row.className="edit-row";row.dataset.idx=i;

    let sched='<div class="sched-row"><div class="sched-btn'+(allOn?" on":"")+'" data-all>7j</div>';
    DAY_L.forEach((lbl,idx)=>{sched+='<div class="sched-btn'+(h.days.includes(idx+1)?" on":"")+'" data-day="'+(idx+1)+'">'+lbl+'</div>';});
    sched+='</div>';

    row.innerHTML=
      '<div class="edit-handle">⠿</div>'+
      '<div class="edit-main">'+
        '<div class="edit-top-row">'+
          '<div class="edit-emoji-btn" data-idx="'+i+'">'+h.icon+'</div>'+
          '<input class="edit-input" value="'+h.label.replace(/"/g,"&quot;")+'" data-idx="'+i+'" placeholder="Nom">'+
          '<div class="del-btn" data-idx="'+i+'">✕</div>'+
        '</div>'+sched+
      '</div>';

    row.querySelector(".edit-emoji-btn").addEventListener("click",e=>openEmoji(parseInt(e.currentTarget.dataset.idx)));
    row.querySelector(".edit-input").addEventListener("input",e=>{habits[parseInt(e.currentTarget.dataset.idx)].label=e.currentTarget.value;save();});
    row.querySelector(".del-btn").addEventListener("click",()=>{if(habits.length<=1)return;habits.splice(i,1);save();renderEdit();});
    row.querySelector("[data-all]").addEventListener("click",()=>{habits[i].days=habits[i].days.length===7?[]:[1,2,3,4,5,6,7];save();renderEdit();});
    row.querySelectorAll("[data-day]").forEach(btn=>{btn.addEventListener("click",e=>{
      const d=parseInt(e.currentTarget.dataset.day),idx2=habits[i].days.indexOf(d);
      if(idx2>=0)habits[i].days.splice(idx2,1);else habits[i].days.push(d);
      habits[i].days.sort();save();renderEdit();
    });});

    // Drag — pointer capture on handle only
    const handle=row.querySelector(".edit-handle");
    handle.addEventListener("pointerdown",e=>{
      e.preventDefault();e.stopPropagation();
      handle.setPointerCapture(e.pointerId);
      dragSrcIdx=i;row.classList.add("dragging");
      if(navigator.vibrate)navigator.vibrate(20);
      function onMove(ev){
        ev.preventDefault();
        document.querySelectorAll("#edit-list .edit-row").forEach(r=>r.classList.remove("drag-over"));
        const t=document.elementFromPoint(ev.clientX,ev.clientY);
        const tr=t?t.closest(".edit-row"):null;
        if(tr&&tr!==row)tr.classList.add("drag-over");
      }
      function onUp(ev){
        handle.removeEventListener("pointermove",onMove);
        handle.removeEventListener("pointerup",onUp);
        handle.removeEventListener("pointercancel",onUp);
        row.classList.remove("dragging");
        let targetIdx=null;
        document.querySelectorAll("#edit-list .edit-row").forEach(r=>{
          r.classList.remove("drag-over");
          const rect=r.getBoundingClientRect();
          if(ev.clientY>=rect.top&&ev.clientY<=rect.bottom)targetIdx=parseInt(r.dataset.idx);
        });
        if(targetIdx!==null&&targetIdx!==dragSrcIdx){const moved=habits.splice(dragSrcIdx,1)[0];habits.splice(targetIdx,0,moved);save();}
        dragSrcIdx=null;renderEdit();
      }
      handle.addEventListener("pointermove",onMove);
      handle.addEventListener("pointerup",onUp);
      handle.addEventListener("pointercancel",onUp);
    });
    el.appendChild(row);
  });
}

function addHabit(){
  habits.push({key:"h_"+Date.now(),icon:"⭐",label:"Nouvelle habitude",days:[1,2,3,4,5,6,7]});
  save();renderEdit();
  setTimeout(()=>document.getElementById("page-edit").scrollTo({top:99999,behavior:"smooth"}),100);
}

// ── WALLPAPER ─────────────────────────────────────────────────────
function applyWallpaper(){
  if(wallpaper.type==="color"){
    document.body.style.background=wallpaper.value;
    document.body.classList.remove("has-bg");
  } else if(wallpaper.type==="image"){
    document.body.style.backgroundImage="url("+wallpaper.value+")";
    document.body.style.backgroundSize="cover";
    document.body.style.backgroundPosition="center";
    document.body.style.backgroundAttachment="fixed";
    document.body.classList.add("has-bg");
  } else {
    document.body.style.background="";
    document.body.style.backgroundImage="";
    document.body.classList.remove("has-bg");
  }
}

function buildColorGrid(){
  const row=document.getElementById("color-row");
  COLORS.forEach(c=>{
    const sw=document.createElement("div");
    sw.className="color-swatch"+(wallpaper.type==="color"&&wallpaper.value===c.hex?" sel":"");
    sw.style.background=c.hex;sw.title=c.name;
    sw.addEventListener("click",()=>{
      wallpaper={type:"color",value:c.hex};save();applyWallpaper();
      document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("sel"));
      sw.classList.add("sel");
    });
    row.appendChild(sw);
  });
}

document.getElementById("wp-img-btn").addEventListener("click",()=>document.getElementById("wp-file").click());
document.getElementById("wp-file").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{wallpaper={type:"image",value:ev.target.result};save();applyWallpaper();};
  reader.readAsDataURL(file);
});
document.getElementById("wp-clear-btn").addEventListener("click",()=>{
  wallpaper={type:"none",value:""};save();applyWallpaper();
  document.querySelectorAll(".color-swatch").forEach(s=>s.classList.remove("sel"));
});

// ── EMOJI ─────────────────────────────────────────────────────────
function openEmoji(idx){
  emojiFor=idx;const grid=document.getElementById("egrid");grid.innerHTML="";
  EMOJIS.forEach(e=>{const d=document.createElement("div");d.className="eopt";d.textContent=e;d.addEventListener("click",()=>pickEmoji(e));grid.appendChild(d);});
  document.getElementById("epicker").classList.add("open");
}
function pickEmoji(e){if(emojiFor!==null){habits[emojiFor].icon=e;save();renderEdit();}document.getElementById("epicker").classList.remove("open");emojiFor=null;}
document.getElementById("epicker").addEventListener("click",e=>{if(e.target===document.getElementById("epicker"))document.getElementById("epicker").classList.remove("open");});

// ── NAV ───────────────────────────────────────────────────────────
function showPage(name){
  ["today","stats","edit"].forEach(p=>{
    document.getElementById("page-"+p).classList.toggle("active",p===name);
    document.getElementById("tbtn-"+p).classList.toggle("on",p===name);
  });
  const isTod=name==="today";
  ["btn-prev","btn-now","btn-next"].forEach(id=>document.getElementById(id).style.visibility=isTod?"":"hidden");
  if(name==="stats")renderStats();
  if(name==="edit")renderEdit();
}
function goToday(){weekOff=0;selectedDow=isoDow(todayMidnight());renderToday();}
document.getElementById("btn-prev").addEventListener("click",()=>{weekOff--;renderToday();});
document.getElementById("btn-next").addEventListener("click",()=>{weekOff++;renderToday();});
document.getElementById("btn-now").addEventListener("click",goToday);
document.getElementById("add-btn").addEventListener("click",addHabit);
["today","stats","edit"].forEach(p=>document.getElementById("tbtn-"+p).addEventListener("click",()=>showPage(p)));
["day","week","month"].forEach(p=>{document.getElementById("pt-"+p).addEventListener("click",()=>{statPeriod=p;["day","week","month"].forEach(x=>document.getElementById("pt-"+x).classList.toggle("on",x===p));renderHist();});});

// ── INIT ──────────────────────────────────────────────────────────
load();
selectedDow=isoDow(todayMidnight());
buildColorGrid();
applyWallpaper();
updateStartBtn();
goToday();
showPage("today");
</script>
